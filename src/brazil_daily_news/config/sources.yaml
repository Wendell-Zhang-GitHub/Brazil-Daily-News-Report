report:
  title: "巴西经贸信息周报"
  include_empty_sections: true
  keyword_groups:
    trade_data:
      - "comércio exterior"
      - "comercio exterior"
      - "balança comercial"
      - "export"
      - "import"
      - "corrente de comércio"
      - "外贸"
      - "经贸"
      - "贸易"
      - "出口"
      - "进口"
    trade_policy:
      - "tarifa"
      - "antidumping"
      - "dumping"
      - "defesa comercial"
      - "duimp"
      - "siscomex"
      - "lpco"
      - "declaração única de importação"
      - "declaracao unica de importacao"
      - "desembaraço"
      - "desembaraco"
      - "政策"
      - "关税"
      - "贸易政策"
      - "通关"
      - "报关"
    bilateral:
      - "brasil"
      - "brazil"
      - "china"
      - "chinês"
      - "chin"
      - "巴西"
      - "中国"

sources:
  - name: "商务部驻巴西经商处"
    country: "china"
    category: "中方官方"
    base_url: "https://br.mofcom.gov.cn"
    list_urls:
      - "https://br.mofcom.gov.cn/"
    parser: "mofcom_home"
    verify_ssl: false
    enabled: true
    priority: 1
    max_candidates: 30

  - name: "商务部"
    country: "china"
    category: "中方官方"
    base_url: "https://www.mofcom.gov.cn"
    list_urls:
      - "https://www.mofcom.gov.cn/"
    parser: "generic_anchor"
    entry_url_regex: "/art/\\d{4}/art_"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 35

  - name: "中国政府网"
    country: "china"
    category: "中方官方"
    base_url: "https://www.gov.cn"
    list_urls:
      - "https://www.gov.cn/"
    parser: "generic_anchor"
    entry_url_regex: "/zhengce|/yaowen|/xinwen"
    verify_ssl: true
    enabled: true
    priority: 3
    max_candidates: 30

  - name: "人民网国际频道"
    country: "china"
    category: "中方官方"
    base_url: "https://world.people.com.cn"
    list_urls:
      - "https://world.people.com.cn/GB/157278/index.html"
      - "https://world.people.com.cn/GB/157278/index2.html"
    parser: "chinese_media"
    entry_url_regex: "/n1/\\d{4}/\\d{4}/c1002-"
    verify_ssl: true
    enabled: true
    priority: 3
    max_candidates: 80

  - name: "新华网"
    country: "china"
    category: "中方官方"
    base_url: "https://www.news.cn"
    list_urls:
      - "https://www.news.cn/fortune/index.htm"
      - "https://www.news.cn/world/index.htm"
    parser: "chinese_media"
    entry_url_regex: "/(fortune|world|silkroad)/\\d{8}/"
    verify_ssl: true
    enabled: true
    priority: 3
    max_candidates: 60

  - name: "海关总署"
    country: "china"
    category: "中方官方"
    base_url: "https://www.customs.gov.cn"
    list_urls:
      - "https://www.customs.gov.cn/customs/302249/302266/index.html"
    parser: "customs"
    verify_ssl: false
    enabled: false  # 504 超时，服务器端问题，暂时禁用
    priority: 2
    max_candidates: 20

  - name: "港澳事务办公室"
    country: "china"
    category: "中方官方"
    base_url: "https://www.hmo.gov.cn"
    list_urls:
      - "https://www.hmo.gov.cn/xwzx/zwyw/"
      - "https://www.hmo.gov.cn/xwzx/gzdt/"
    parser: "hmo"
    entry_url_regex: "/\\d{6}/t\\d{8}_\\d+\\.html"
    verify_ssl: true
    enabled: true
    priority: 3
    max_candidates: 20

  - name: "MDIC 新闻"
    country: "brazil"
    category: "巴西官方"
    base_url: "https://www.gov.br/mdic"
    list_urls:
      - "https://www.gov.br/mdic/pt-br/assuntos/noticias"
      - "https://www.gov.br/mdic/pt-br/assuntos/noticias/2026/marco"
    parser: "govbr_news"
    entry_url_regex: "/assuntos/noticias/[0-9]{4}/[a-z]{3,}/"
    verify_ssl: true
    enabled: true
    priority: 1
    max_candidates: 40

  - name: "Siscomex 新闻"
    country: "brazil"
    category: "巴西官方"
    base_url: "https://www.gov.br/siscomex"
    list_urls:
      - "https://www.gov.br/siscomex/pt-br/noticias/noticias-siscomex-importacao/Comunicados"
      - "https://www.gov.br/siscomex/pt-br/noticias/noticias-siscomex-exportacao"
      - "https://www.gov.br/siscomex/pt-br/noticias/noticias-siscomex-sistemas"
    parser: "govbr_news"
    entry_url_regex: "/(importacao|exportacao|sistemas)-no-\\d{4}-\\d{3}"
    verify_ssl: true
    enabled: true
    priority: 1
    max_candidates: 20

  - name: "Fazenda 新闻"
    country: "brazil"
    category: "巴西官方"
    base_url: "https://www.gov.br/fazenda"
    list_urls:
      - "https://www.gov.br/fazenda/pt-br/assuntos/noticias"
    parser: "govbr_news"
    entry_url_regex: "/assuntos/noticias/[0-9]{4}/[a-z]{3,}/"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 30

  - name: "IBGE 新闻"
    country: "brazil"
    category: "巴西官方"
    base_url: "https://servicodados.ibge.gov.br"
    list_urls:
      - "https://servicodados.ibge.gov.br/api/v3/noticias/?qtd=30"
    parser: "ibge"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 30

  - name: "Planalto"
    country: "brazil"
    category: "巴西官方"
    base_url: "https://www.gov.br/planalto"
    list_urls:
      - "https://www.gov.br/planalto/pt-br/acompanhe-o-planalto/noticias"
    parser: "govbr"
    entry_url_regex: "/noticias/\\d{4}/"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 30

  - name: "BCB Focus"
    country: "brazil"
    category: "巴西官方"
    base_url: "https://www.bcb.gov.br"
    list_urls:
      - "https://www.bcb.gov.br/publicacoes/focus"
    parser: "bcb_focus"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 12

  - name: "FGV IBRE 博客"
    country: "brazil"
    category: "巴西非官方-研究机构"
    officiality: "非官方"
    credibility: "高"
    base_url: "https://blogdoibre.fgv.br"
    list_urls:
      - "https://blogdoibre.fgv.br/"
    parser: "generic_anchor"
    entry_url_regex: "/posts/"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 30

  - name: "CNI 新闻"
    country: "brazil"
    category: "巴西非官方-行业协会"
    officiality: "非官方"
    credibility: "高"
    base_url: "https://noticias.portaldaindustria.com.br"
    list_urls:
      - "https://noticias.portaldaindustria.com.br/lista-noticias-total/?q=com%C3%A9rcio%20exterior&limit=24&offset=0&sort=desc"
      - "https://noticias.portaldaindustria.com.br/lista-noticias-total/?q=balan%C3%A7a%20comercial&limit=24&offset=0&sort=desc"
    parser: "json_list"
    entry_url_regex: "/noticias/[^/]+/.+/"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 30

  - name: "CEBC 双边贸易"
    country: "brazil"
    category: "巴西非官方-双边经贸机构"
    officiality: "非官方"
    credibility: "高"
    base_url: "https://www.cebc.org.br"
    list_urls:
      - "https://www.cebc.org.br/categoria/cebc-alerta/comercio-bilateral/feed/"
    parser: "rss_feed"
    verify_ssl: true
    enabled: true
    priority: 1
    max_candidates: 20

  - name: "DatamarNews"
    country: "brazil"
    category: "巴西非官方-数据型媒体"
    officiality: "非官方"
    credibility: "中高"
    base_url: "https://datamarnews.com"
    list_urls:
      - "https://datamarnews.com/pt/home-pt/"
      - "https://datamarnews.com/pt/category/economia/"
      - "https://datamarnews.com/pt/category/regrasdecomercio/"
    parser: "generic_anchor"
    entry_url_regex: "/pt/noticias/"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 30
