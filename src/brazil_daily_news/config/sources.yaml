report:
  title: "巴西经贸信息周报"
  include_empty_sections: true
  keyword_groups:
    trade_data:
      - "comércio exterior"
      - "comercio exterior"
      - "balança comercial"
      - "export"
      - "import"
      - "corrente de comércio"
      - "外贸"
      - "经贸"
      - "贸易"
      - "出口"
      - "进口"
    trade_policy:
      - "tarifa"
      - "antidumping"
      - "dumping"
      - "defesa comercial"
      - "duimp"
      - "siscomex"
      - "lpco"
      - "declaração única de importação"
      - "declaracao unica de importacao"
      - "desembaraço"
      - "desembaraco"
      - "政策"
      - "关税"
      - "贸易政策"
      - "通关"
      - "报关"
    bilateral:
      - "brasil"
      - "brazil"
      - "china"
      - "chinês"
      - "chin"
      - "巴西"
      - "中国"

sources:
  - name: "商务部驻巴西经商处"
    country: "china"
    category: "中方官方"
    base_url: "https://br.mofcom.gov.cn"
    list_urls:
      - "https://br.mofcom.gov.cn/"
    parser: "mofcom_home"
    verify_ssl: false
    enabled: true
    priority: 1
    max_candidates: 30

  - name: "商务部"
    country: "china"
    category: "中方官方"
    base_url: "https://www.mofcom.gov.cn"
    list_urls:
      - "https://www.mofcom.gov.cn/"
    parser: "generic_anchor"
    entry_url_regex: "/article/"
    verify_ssl: true
    enabled: true
    priority: 2
    max_candidates: 20

  - name: "中国政府网"
    country: "china"
    category: "中方官方"
    base_url: "https://www.gov.cn"
    list_urls:
      - "https://www.gov.cn/"
    parser: "generic_anchor"
    entry_url_regex: "/zhengce|/yaowen|/xinwen"
