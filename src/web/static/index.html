<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴西经贸信息简报</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-900: #0a1628;
            --navy-800: #111d35;
            --navy-700: #1a2a4a;
            --navy-600: #243b65;
            --navy-500: #2e4d80;
            --gold-400: #d4a853;
            --gold-300: #e8c373;
            --gold-200: #f0d696;
            --slate-100: #e8ecf2;
            --slate-200: #cdd5e0;
            --slate-300: #9aa5b8;
            --slate-400: #6b7a90;
            --green-accent: #2ecc71;
            --red-accent: #e74c3c;
            --bg-page: #f0f2f6;
            --bg-card: #ffffff;
            --text-primary: #1a2340;
            --text-secondary: #4a5672;
            --text-muted: #8694a9;
            --shadow-sm: 0 1px 3px rgba(10,22,40,0.06);
            --shadow-md: 0 4px 16px rgba(10,22,40,0.08);
            --shadow-lg: 0 8px 32px rgba(10,22,40,0.12);
            --radius: 12px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-700) 100%);
            padding: 48px 24px 40px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold-400), var(--gold-200), var(--gold-400));
        }
        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212,168,83,0.15);
            border: 1px solid rgba(212,168,83,0.3);
            color: var(--gold-300);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .header-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold-400);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .header-sub {
            color: var(--slate-300);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ── Main ── */
        .main {
            max-width: 900px;
            margin: -20px auto 60px;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.04);
            transition: box-shadow var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--navy-700);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title::before {
            content: '';
            width: 3px;
            height: 20px;
            background: linear-gradient(180deg, var(--gold-400), var(--gold-200));
            border-radius: 2px;
        }

        /* ── Form ── */
        .form-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 140px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group select,
        .form-group input {
            padding: 10px 14px;
            border: 1.5px solid var(--slate-200);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            background: #fff;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }
        .form-group select:focus,
        .form-group input:focus {
            border-color: var(--navy-500);
            box-shadow: 0 0 0 3px rgba(46,77,128,0.1);
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--navy-700), var(--navy-800));
            color: #fff;
            box-shadow: 0 2px 8px rgba(10,22,40,0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--navy-600), var(--navy-700));
            box-shadow: 0 4px 12px rgba(10,22,40,0.3);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            background: var(--slate-200);
            color: var(--slate-400);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .btn-download {
            background: transparent;
            color: var(--navy-600);
            border: 1.5px solid var(--slate-200);
            font-size: 13px;
            padding: 7px 16px;
        }
        .btn-download:hover {
            border-color: var(--navy-500);
            background: rgba(46,77,128,0.04);
        }
        .btn-download svg {
            width: 14px;
            height: 14px;
        }
        .btn-cancel {
            background: transparent;
            color: var(--red-accent);
            border: 1.5px solid rgba(231,76,60,0.3);
            padding: 10px 20px;
        }
        .btn-cancel:hover {
            background: rgba(231,76,60,0.06);
            border-color: var(--red-accent);
        }

        .estimate {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Status ── */
        .status {
            margin-top: 18px;
            padding: 14px 18px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            transition: all var(--transition);
        }
        .status.active { display: flex; align-items: center; gap: 12px; }
        .status-timer {
            margin-left: auto;
            font-variant-numeric: tabular-nums;
            font-size: 13px;
            opacity: 0.7;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status.running {
            background: rgba(46,77,128,0.06);
            border: 1px solid rgba(46,77,128,0.12);
            color: var(--navy-600);
        }
        .status.completed {
            background: rgba(46,204,113,0.06);
            border: 1px solid rgba(46,204,113,0.15);
            color: #1a8a4a;
        }
        .status.failed {
            background: rgba(231,76,60,0.06);
            border: 1px solid rgba(231,76,60,0.15);
            color: var(--red-accent);
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--slate-200);
            border-top-color: var(--navy-600);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .check-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ── Progress Bar ── */
        .progress-bar {
            height: 3px;
            background: var(--slate-100);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
        }
        .progress-bar.active { display: block; }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--navy-600), var(--gold-400));
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-bar-fill.indeterminate {
            width: 30%;
            animation: indeterminate 1.5s ease-in-out infinite;
        }
        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ── Report ── */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--slate-100);
        }

        .report-content {
            line-height: 1.9;
            color: var(--text-primary);
            font-size: 15px;
        }
        .report-content h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--navy-800);
            margin: 28px 0 12px;
            text-align: left;
        }
        .report-content h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--navy-700);
            margin: 32px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--slate-100);
        }
        .report-content h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--navy-700);
            margin: 24px 0 8px;
        }
        .report-content p {
            margin: 10px 0;
            color: var(--text-secondary);
        }
        .report-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        .report-content ul, .report-content ol {
            margin: 10px 0 10px 24px;
            color: var(--text-secondary);
        }
        .report-content li {
            margin: 6px 0;
        }
        .report-content blockquote {
            border-left: 3px solid var(--gold-400);
            padding: 12px 16px;
            margin: 16px 0;
            background: rgba(212,168,83,0.04);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
        }
        .report-content code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            background: var(--slate-100);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--navy-700);
        }
        .report-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
            font-size: 14px;
        }
        .report-content th {
            background: var(--navy-800);
            color: #fff;
            font-weight: 500;
            text-align: left;
            padding: 10px 14px;
        }
        .report-content th:first-child { border-radius: 8px 0 0 0; }
        .report-content th:last-child { border-radius: 0 8px 0 0; }
        .report-content td {
            border-bottom: 1px solid var(--slate-100);
            padding: 10px 14px;
            color: var(--text-secondary);
        }
        .report-content tr:hover td {
            background: rgba(46,77,128,0.02);
        }
        .report-content hr {
            border: none;
            height: 1px;
            background: var(--slate-100);
            margin: 28px 0;
        }
        .report-content a {
            color: var(--navy-500);
            text-decoration: none;
            border-bottom: 1px solid rgba(46,77,128,0.2);
            transition: border-color var(--transition);
        }
        .report-content a:hover {
            border-color: var(--navy-500);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .header { padding: 36px 16px 32px; }
            .header h1 { font-size: 24px; }
            .main { padding: 0 16px; }
            .card { padding: 20px; }
            .form-row { flex-direction: column; }
            .form-group { min-width: 100%; }
        }

        /* ── Fade-in animation ── */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-badge">Intelligence Briefing System</div>
            <h1>巴西经贸信息简报</h1>
            <p class="header-sub">多源采集 &middot; 三层 AI 筛选 &middot; 深度分析</p>
        </div>
    </header>

    <main class="main">
        <div class="card fade-in" style="animation-delay: 0.1s;">
            <div class="card-title">生成简报</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="dateRange">统计区间</label>
                    <select id="dateRange" onchange="onRangeChange()">
                        <option value="24h">过去 24 小时</option>
                        <option value="3d" selected>过去 3 个工作日</option>
                        <option value="1w">过去一周</option>
                    </select>
                </div>
                <div class="form-group" style="max-width:100px;">
                    <label for="maxArticles">精选条数</label>
                    <input type="number" id="maxArticles" value="6" min="1" max="10">
                </div>
                <button class="btn btn-primary" id="generateBtn" onclick="generate()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    生成简报
                </button>
                <button class="btn btn-cancel" id="cancelBtn" onclick="cancelTask()" style="display:none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    终止任务
                </button>
            </div>
            <div class="estimate" id="estimateText"></div>
            <div class="status" id="statusBox">
                <div class="spinner" id="statusSpinner"></div>
                <span id="statusText"></span>
                <span class="status-timer" id="statusTimer"></span>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-bar-fill indeterminate" id="progressFill"></div>
            </div>
        </div>

        <div class="card fade-in" id="reportCard" style="display:none;">
            <div class="report-header">
                <div class="card-title" style="margin-bottom:0;">简报内容</div>
                <button class="btn btn-download" id="downloadBtn" onclick="downloadReport()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载 Markdown
                </button>
            </div>
            <div class="report-content" id="reportContent"></div>
        </div>
    </main>

    <footer class="footer">
        巴西经贸信息简报系统 &middot; Gemini + Claude AI Pipeline
    </footer>

    <script>
        function fmt(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        const ESTIMATE_TEXT = '预估耗时 6~10 分钟';

        function calcDates(range) {
            const end = new Date();
            const start = new Date();
            if (range === '24h') {
                start.setDate(end.getDate() - 1);
            } else if (range === '3d') {
                let workdays = 0;
                const d = new Date(end);
                while (workdays < 3) {
                    d.setDate(d.getDate() - 1);
                    const day = d.getDay();
                    if (day !== 0 && day !== 6) workdays++;
                }
                start.setTime(d.getTime());
            } else if (range === '1w') {
                start.setDate(end.getDate() - 7);
            }
            return { start: fmt(start), end: fmt(end) };
        }

        function onRangeChange() {
            document.getElementById('estimateText').textContent = ESTIMATE_TEXT;
        }

        document.getElementById('estimateText').textContent = ESTIMATE_TEXT;

        let _currentMarkdown = '';
        let _currentTaskId = null;
        let _pollInterval = null;
        let _startTime = null;
        let _timerInterval = null;

        function _fmtElapsed(ms) {
            const secs = Math.floor(ms / 1000);
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return m > 0 ? `${m}分${String(s).padStart(2,'0')}秒` : `${s}秒`;
        }

        function _startTimer() {
            _stopTimer();
            const timer = document.getElementById('statusTimer');
            _timerInterval = setInterval(() => {
                if (_startTime) timer.textContent = _fmtElapsed(Date.now() - _startTime);
            }, 1000);
        }

        function _stopTimer() {
            if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
        }

        function showReport(markdown) {
            _currentMarkdown = markdown;
            const card = document.getElementById('reportCard');
            const content = document.getElementById('reportContent');
            content.innerHTML = marked.parse(markdown);
            card.style.display = 'block';
            card.classList.add('fade-in');
            setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        }

        function downloadReport() {
            if (!_currentMarkdown) return;
            const blob = new Blob([_currentMarkdown], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${new Date().toISOString().split('T')[0]}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function setStatus(cls, text) {
            const box = document.getElementById('statusBox');
            const txt = document.getElementById('statusText');
            const spinner = document.getElementById('statusSpinner');
            const bar = document.getElementById('progressBar');
            const fill = document.getElementById('progressFill');

            box.className = 'status active ' + cls;
            txt.textContent = text;

            if (cls === 'running') {
                spinner.style.display = 'block';
                bar.className = 'progress-bar active';
                fill.className = 'progress-bar-fill indeterminate';
            } else {
                spinner.style.display = 'none';
                bar.className = 'progress-bar';
                if (cls === 'completed') {
                    spinner.style.display = 'none';
                }
            }
        }

        function showButtons(running) {
            document.getElementById('generateBtn').style.display = running ? 'none' : '';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('cancelBtn').style.display = running ? '' : 'none';
        }

        async function generate() {
            const range = document.getElementById('dateRange').value;
            const force = true;

            const dates = calcDates(range);
            const startDate = dates.start;
            const endDate = dates.end;

            const maxArt = parseInt(document.getElementById('maxArticles').value) || 6;
            if (maxArt < 1 || maxArt > 10) {
                alert('精选条数必须在 1-10 之间');
                return;
            }

            showButtons(true);
            setStatus('running', '正在提交任务...');
            _startTime = Date.now();
            _startTimer();

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        start_date: startDate,
                        end_date: endDate,
                        force,
                        max_articles: maxArt,
                    }),
                });
                const data = await res.json();
                _currentTaskId = data.task_id;
                pollTask(data.task_id);
            } catch (e) {
                setStatus('failed', '提交失败: ' + e.message);
                showButtons(false);
            }
        }

        async function cancelTask() {
            if (!_currentTaskId) return;
            try {
                await fetch(`/api/tasks/${_currentTaskId}/cancel`, { method: 'POST' });
            } catch (e) { /* ignore */ }
            if (_pollInterval) clearInterval(_pollInterval);
            _pollInterval = null;
            _currentTaskId = null;
            _stopTimer();
            document.getElementById('statusTimer').textContent = '';
            setStatus('failed', '任务已取消');
            showButtons(false);
        }

        function pollTask(taskId) {
            _pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/tasks/${taskId}`);
                    const task = await res.json();

                    if (task.status === 'running' || task.status === 'pending') {
                        setStatus('running', task.progress || '处理中...');
                    } else if (task.status === 'completed') {
                        clearInterval(_pollInterval);
                        _pollInterval = null;
                        _stopTimer();
                        let elapsed = '';
                        if (_startTime) {
                            elapsed = `，耗时 ${_fmtElapsed(Date.now() - _startTime)}`;
                        }
                        document.getElementById('statusTimer').textContent = '';
                        setStatus('completed', '简报生成完成' + elapsed);
                        showButtons(false);
                        if (task.result) showReport(task.result);
                    } else if (task.status === 'cancelled') {
                        clearInterval(_pollInterval);
                        _pollInterval = null;
                        _stopTimer();
                        document.getElementById('statusTimer').textContent = '';
                        setStatus('failed', '任务已取消');
                        showButtons(false);
                    } else if (task.status === 'failed') {
                        clearInterval(_pollInterval);
                        _pollInterval = null;
                        _stopTimer();
                        document.getElementById('statusTimer').textContent = '';
                        setStatus('failed', '生成失败: ' + (task.error || '未知错误'));
                        showButtons(false);
                    }
                } catch (e) {
                    clearInterval(_pollInterval);
                    _stopTimer();
                    document.getElementById('statusTimer').textContent = '';
                    _pollInterval = null;
                    setStatus('failed', '查询状态失败');
                    showButtons(false);
                }
            }, 3000);
        }
    </script>
</body>
</html>
