services:
  - type: web
    name: brazil-daily-news
    runtime: python
    buildCommand: pip install .
    startCommand: uvicorn brazil_daily_news.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_API_KEY
        sync: false        # 可选：设置后作为默认值，用户也可在前端填写
      - key: AI_BASE_URL
        sync: false        # 可选：设置后作为默认值，用户也可在前端填写
      - key: AI_HAIKU_MODEL
        sync: false
      - key: AI_SONNET_MODEL
        sync: false
