services:
  - type: web
    name: brazil-daily-news
    runtime: python
    buildCommand: pip install .
    startCommand: uvicorn brazil_daily_news.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # 必填：Gemini API Key
      - key: GEMINI_MODEL
        sync: false        # 必填：粗筛模型
      - key: GEMINI_DEEP_MODEL
        sync: false        # 必填：深度评分模型
      - key: GEMINI_CONCURRENCY
        sync: false        # 可选，默认200
      - key: AI_API_KEY
        sync: false        # 必填：报告 API Key
      - key: AI_BASE_URL
        sync: false        # 必填：报告 API 地址
      - key: AI_SONNET_MODEL
        sync: false        # 必填：报告模型
